<!doctype html><html><head><meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{width:100vw;height:100vh;overflow:hidden;font-family:'Montserrat','DejaVu Sans',Arial,sans-serif;color:#fff}
.wrap{position:relative;width:100%;height:100%}
/* base bg color layer */
.bg-color{position:absolute;inset:0}
/* optional photo bg */
.bg-photo{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.4);display:none}
/* generative bg overlay (gradients/patterns) */
.bg-gen{position:absolute;inset:0}
/* top dark vignette — ensures title readability over silhouette head */
.top-vig{position:absolute;top:0;left:0;right:0;height:52%;
  background:linear-gradient(180deg,rgba(0,0,0,.9) 0%,rgba(0,0,0,.65) 35%,rgba(0,0,0,.2) 65%,transparent 100%)}
/* bottom dark vignette — subtitle readability */
.bot-vig{position:absolute;bottom:0;left:0;right:0;height:38%;
  background:linear-gradient(0deg,rgba(0,0,0,.85) 0%,rgba(0,0,0,.4) 50%,transparent 100%)}
/* silhouette: 72% max-height, centered, bottom-anchored */
.sil{position:absolute;bottom:0;left:50%;transform:translateX(-50%);max-height:72%;object-fit:contain}
/* TOP block: safe zone top 13vh, avoids right 18vw (TikTok buttons) */
.top-block{position:absolute;top:13vh;left:6vw;right:18vw}
.brand{font-size:2.4vh;font-weight:700;opacity:.75;letter-spacing:.04em;text-transform:lowercase;margin-bottom:1.8vh}
/* title: no plate — vignette provides contrast; strong shadow */
.title{font-size:8vh;font-weight:900;line-height:.95;letter-spacing:-.22vw;
  text-shadow:0 3px 16px rgba(0,0,0,.9),0 0 50px rgba(0,0,0,.6);word-break:break-word}
/* BOTTOM block: subtitle plate — safe zone bottom 17vh */
.bot-block{position:absolute;bottom:17vh;left:6vw;right:18vw}
.sub-plate{background:rgba(0,0,0,.58);border-radius:1.8vw;padding:2vh 3vw;display:none}
.sub{font-size:3.2vh;font-weight:400;line-height:1.38;opacity:.94}
</style></head><body>
<div class="wrap" id="wrap">
  <div class="bg-color" id="bgc"></div>
  <div class="bg-photo" id="bgp"></div>
  <div class="bg-gen" id="bgg"></div>
  <div class="top-vig"></div>
  <div class="bot-vig"></div>
  <img id="sil" class="sil"/>
  <div class="top-block">
    <div class="brand" id="brand"></div>
    <div class="title" id="title"></div>
  </div>
  <div class="bot-block">
    <div class="sub-plate" id="sub-plate">
      <div class="sub" id="subtitle"></div>
    </div>
  </div>
</div>
<script>
const data=__DATA__;
const bg=data.bgColor||'#0f172a';
const ac=data.accent||'#3b82f6';
const style=data.bgStyle||'flat';

function hexAlpha(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`}
function shift(h,n){return'#'+[1,3,5].map(i=>Math.min(255,Math.max(0,parseInt(h.slice(i,i+2),16)+n)).toString(16).padStart(2,'0')).join('')}

const bgc=document.getElementById('bgc');
const bgg=document.getElementById('bgg');

if(data.backgroundImageUrl){
  const p=document.getElementById('bgp');p.style.display='block';
  p.style.backgroundImage=`url(${data.backgroundImageUrl})`;
  bgc.style.background='#000';
} else {
  bgc.style.background=bg;
  switch(style){
    case'gradient':
      bgc.style.background=`linear-gradient(155deg,${shift(bg,18)} 0%,${bg} 45%,${shift(bg,-25)} 100%)`;break;
    case'radial':
      bgc.style.background=bg;
      bgg.style.background=`radial-gradient(ellipse at 50% 20%,${hexAlpha(ac,0.35)} 0%,transparent 60%)`;break;
    case'mesh':
      bgc.style.background=bg;
      bgg.style.background=`radial-gradient(at 20% 25%,${hexAlpha(ac,0.28)} 0%,transparent 45%),radial-gradient(at 80% 70%,${hexAlpha(shift(ac,50),0.2)} 0%,transparent 45%),radial-gradient(at 55% 85%,${hexAlpha(shift(ac,-30),0.22)} 0%,transparent 40%)`;break;
    case'aurora':
      bgc.style.background=bg;
      bgg.style.background=`radial-gradient(at 10% 20%,${hexAlpha(ac,0.4)} 0%,transparent 40%),radial-gradient(at 90% 10%,${hexAlpha(shift(ac,80),0.25)} 0%,transparent 35%),radial-gradient(at 40% 50%,${hexAlpha(shift(ac,-20),0.18)} 0%,transparent 45%),radial-gradient(at 75% 80%,${hexAlpha(shift(ac,40),0.2)} 0%,transparent 38%)`;break;
    case'grid':
      bgc.style.background=bg;
      bgg.style.backgroundImage=`linear-gradient(${hexAlpha('#fff',0.04)} 1px,transparent 1px),linear-gradient(90deg,${hexAlpha('#fff',0.04)} 1px,transparent 1px)`;
      bgg.style.backgroundSize='54px 54px';break;
    case'dots':
      bgc.style.background=bg;
      bgg.style.backgroundImage=`radial-gradient(circle,${hexAlpha('#fff',0.12)} 1px,transparent 1px)`;
      bgg.style.backgroundSize='36px 36px';break;
  }
}

const titleEl=document.getElementById('title');
const titleStr=data.title||'';
titleEl.textContent=titleStr;
// adaptive font size: shrink for longer titles
(function fitTitle(){
  const len=titleStr.length;
  const vh=len<25?8:len<45?6.5:len<70?5.5:4.5;
  titleEl.style.fontSize=vh+'vh';
})();
document.getElementById('brand').textContent=data.brandHandle||'';
if(data.subtitle){const sp=document.getElementById('sub-plate');sp.style.display='block';document.getElementById('subtitle').textContent=data.subtitle;}
if(data.silhouetteImageUrl)document.getElementById('sil').src=data.silhouetteImageUrl;
</script>
</body></html>
