<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { margin: 0; font-family: "Montserrat", sans-serif; width: 1080px; height: 1350px; background: #0f172a; color: #fff; }
    .wrap { position: relative; width: 100%; height: 100%; overflow: hidden; }
    .bg { position: absolute; inset: 0; background-size: cover; background-position: center; filter: brightness(0.55); }
    .sil { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); max-height: 70%; }
    h1 { position: absolute; left: 72px; right: 72px; top: 90px; font-size: 72px; line-height: 1.1; margin: 0; }
    .sub { position: absolute; left: 72px; right: 72px; bottom: 130px; font-size: 42px; opacity: 0.9; }
    .brand { position: absolute; left: 72px; bottom: 70px; font-size: 30px; opacity: 0.85; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="bg" id="bg"></div>
    <img id="sil" class="sil" />
    <h1 id="title"></h1>
    <div class="sub" id="subtitle"></div>
    <div class="brand" id="brand"></div>
  </div>
  <script>
    const data = __DATA__;
    document.getElementById('title').textContent = data.title || '';
    document.getElementById('subtitle').textContent = data.subtitle || '';
    document.getElementById('brand').textContent = data.brandHandle || '';
    if (data.backgroundImageUrl) document.getElementById('bg').style.backgroundImage = `url(${data.backgroundImageUrl})`;
    if (data.silhouetteImageUrl) document.getElementById('sil').src = data.silhouetteImageUrl;
  </script>
</body>
</html>
