<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { margin: 0; font-family: "Arial", sans-serif; }
    #row { display: flex; width: max-content; height: 1350px; }
    .slide { width: 1080px; height: 1350px; box-sizing: border-box; padding: 80px; color: #fff; background: linear-gradient(150deg, #0f172a, #1e293b); border-right: 2px solid #334155; }
    .title { font-size: 66px; line-height: 1.05; margin-bottom: 30px; font-weight: 800; }
    .body { font-size: 40px; opacity: 0.95; }
  </style>
</head>
<body>
  <div id="row"></div>
  <script>
    const data = __DATA__;
    const slides = Array.isArray(data.slides) ? data.slides : [];
    const row = document.getElementById('row');
    row.style.height = (data.slideHeight || 1350) + 'px';

    slides.forEach((s, i) => {
      const el = document.createElement('section');
      el.className = 'slide';
      el.style.width = (data.slideWidth || 1080) + 'px';
      el.innerHTML = `<div class="title">${s.title || ''}</div><div class="body">${s.body || ''}</div><div style="position:absolute;bottom:70px;opacity:0.7">${data.brandHandle || ''} • ${i + 1}/${slides.length}</div>`;
      row.appendChild(el);
    });
  </script>
</body>
</html>
