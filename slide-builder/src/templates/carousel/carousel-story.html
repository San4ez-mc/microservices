<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }
    body { margin:0; font-family:'Montserrat','DejaVu Sans',Arial,sans-serif; }
    #row { display:flex; width:max-content; }
    .slide { position:relative; overflow:hidden; color:#fff; }
    .s-bg  { position:absolute; inset:0; }
    .s-bgg { position:absolute; inset:0; }
    /* top vignette — makes text readable, fades by 45% of height */
    .s-vig-top { position:absolute; top:0; left:0; right:0; height:52%;
                 background:linear-gradient(180deg,rgba(0,0,0,.9) 0%,rgba(0,0,0,.65) 30%,rgba(0,0,0,.15) 65%,transparent 100%); }
    /* bottom vignette for brand */
    .s-vig-bot { position:absolute; bottom:0; left:0; right:0; height:28%;
                 background:linear-gradient(0deg,rgba(0,0,0,.7) 0%,rgba(0,0,0,.2) 55%,transparent 100%); }
    /* silhouette: max 60% height so text zone stays clear */
    .s-sil { position:absolute; bottom:0; left:50%; transform:translateX(-50%); max-height:60%; object-fit:contain; opacity:0.88; }
    /* text block: safe zone top 13%, left 7%, right 20% */
    .s-top { position:absolute; z-index:3; top:0; left:0; right:0; }
    /* brand bottom-safe */
    .s-brand { position:absolute; bottom:17%; left:7%; right:4%; z-index:3; font-weight:700; opacity:0.6; letter-spacing:.04em; text-transform:lowercase; }
    /* counter top-right inside right safe zone */
    .s-counter { position:absolute; top:4%; right:4%; z-index:4; font-weight:600; opacity:0.5; }
  </style>
</head>
<body>
  <div id="row"></div>
  <script>
    const data = __DATA__;
    const slides = Array.isArray(data.slides) ? data.slides : [];
    const row = document.getElementById('row');
    const sw = data.slideWidth  || 1080;
    const sh = data.slideHeight || 1920;
    const bg = data.bgColor || '#0f172a';
    const ac = data.accent  || '#3b82f6';
    const bgStyle = data.bgStyle || 'flat';

    function hexAlpha(h,a){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},${a})`}
    function shift(h,n){return'#'+[1,3,5].map(i=>Math.min(255,Math.max(0,parseInt(h.slice(i,i+2),16)+n)).toString(16).padStart(2,'0')).join('')}

    slides.forEach((s, idx) => {
      const el = document.createElement('section');
      el.className = 'slide';
      el.style.width  = sw + 'px';
      el.style.height = sh + 'px';

      // background
      let bgcStyle = `background:${bg}`;
      let bggStyle = '';
      switch(bgStyle) {
        case 'gradient':
          bgcStyle = `background:linear-gradient(150deg,${shift(bg,22)} 0%,${bg} 50%,${shift(bg,-30)} 100%)`; break;
        case 'radial':
          bggStyle = `background:radial-gradient(ellipse at 75% 20%,${hexAlpha(ac,0.4)} 0%,transparent 55%)`; break;
        case 'mesh':
          bggStyle = `background:radial-gradient(at 15% 20%,${hexAlpha(ac,0.35)} 0%,transparent 45%),`+
            `radial-gradient(at 85% 70%,${hexAlpha(shift(ac,60),0.25)} 0%,transparent 45%),`+
            `radial-gradient(at 50% 95%,${hexAlpha(shift(ac,-20),0.2)} 0%,transparent 40%)`; break;
        case 'aurora':
          bggStyle = `background:radial-gradient(at 5% 15%,${hexAlpha(ac,0.45)} 0%,transparent 38%),`+
            `radial-gradient(at 95% 5%,${hexAlpha(shift(ac,90),0.3)} 0%,transparent 35%),`+
            `radial-gradient(at 40% 55%,${hexAlpha(shift(ac,-15),0.2)} 0%,transparent 45%),`+
            `radial-gradient(at 80% 85%,${hexAlpha(shift(ac,50),0.22)} 0%,transparent 40%)`; break;
        case 'grid':
          bggStyle = `background-image:linear-gradient(${hexAlpha('#fff',0.04)} 1px,transparent 1px),`+
            `linear-gradient(90deg,${hexAlpha('#fff',0.04)} 1px,transparent 1px);background-size:54px 54px`; break;
        case 'dots':
          bggStyle = `background-image:radial-gradient(circle,${hexAlpha('#fff',0.12)} 1px,transparent 1px);background-size:36px 36px`; break;
      }

      // font sizes relative to 1080 base
      const r = sw / 1080;
      const title   = s.text    || s.title || '';
      const sub     = s.subText || s.body  || '';
      const tSize   = Math.round((title.length < 28 ? 72 : title.length < 50 ? 60 : 50) * r);
      const sSize   = Math.round(38 * r);
      const bSize   = Math.round(28 * r);
      const cntSize = Math.round(28 * r);
      const alW     = Math.round(80 * r);
      const alH     = Math.round(7 * r);
      const padTop  = Math.round(sh * 0.13);
      const padL    = Math.round(sw * 0.07);
      const padR    = Math.round(sw * 0.20);
      const gap     = Math.round(24 * r);

      const silHtml = data.silhouetteImageUrl
        ? `<img class="s-sil" src="${data.silhouetteImageUrl}">`
        : '';

      el.innerHTML = `
        <div class="s-bg" style="${bgcStyle}"></div>
        <div class="s-bgg" style="${bggStyle}"></div>
        <div class="s-vig-top"></div>
        <div class="s-vig-bot"></div>
        ${silHtml}
        <div class="s-counter" style="font-size:${cntSize}px">${idx+1}/${slides.length}</div>
        <div class="s-top" style="padding:${padTop}px ${padR}px 0 ${padL}px">
          <div style="width:${alW}px;height:${alH}px;border-radius:${Math.round(alH/2)}px;background:${ac};margin-bottom:${gap}px"></div>
          <div style="font-size:${tSize}px;font-weight:900;line-height:1.0;letter-spacing:-0.01em;word-break:break-word;text-shadow:0 3px 14px rgba(0,0,0,.85)">${title}</div>
          ${sub ? `<div style="font-size:${sSize}px;font-weight:400;line-height:1.38;opacity:.88;margin-top:${Math.round(18*r)}px;text-shadow:0 2px 8px rgba(0,0,0,.7)">${sub}</div>` : ''}
        </div>
        <div class="s-brand" style="font-size:${bSize}px">${data.brandHandle || ''}</div>
      `;
      row.appendChild(el);
    });
  </script>
</body>
</html>
