<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { margin: 0; width: 1080px; height: 1350px; font-family: "Arial", sans-serif; color: #fff; }
    .root { position: relative; width: 100%; height: 100%; overflow: hidden; }
    .thumb { position: absolute; inset: 0; background-size: cover; background-position: center; transform: scale(1.03); }
    .overlay { position: absolute; inset: 0; background: linear-gradient(180deg, #0002, #000a 65%); }
    .text { position: absolute; left: 70px; right: 70px; bottom: 100px; font-size: 68px; font-weight: 800; line-height: 1.05; }
    .sub { margin-top: 20px; font-size: 36px; opacity: 0.9; }
  </style>
</head>
<body>
  <div class="root">
    <div class="thumb" id="thumb"></div>
    <div class="overlay"></div>
    <div class="text"><div id="title"></div><div class="sub" id="subtitle"></div></div>
  </div>
  <script>
    const data = __DATA__;
    document.getElementById('title').textContent = data.title || '';
    document.getElementById('subtitle').textContent = data.subtitle || '';
    if (data.thumbnailUrl) {
      document.getElementById('thumb').style.backgroundImage = `url(${data.thumbnailUrl})`;
    }
  </script>
</body>
</html>
